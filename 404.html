<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Không tìm thấy trang - Hugo.io.vn</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 
                        'lunar-red': '#B91C1C', 
                        'lunar-gold': '#F59E0B', 
                        'paper': '#fdfbf7' 
                    },
                    fontFamily: { 
                        sans: ['Roboto', 'sans-serif'], 
                        serif: ['Noto Serif', 'serif']
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f3f4f6;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d1d5db' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); 
        }
        
        /* Hiệu ứng trôi nổi nhẹ cho khối 404 */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body class="font-sans text-gray-800 min-h-screen flex flex-col">

    <!-- Chỗ để tải menu -->
    <div id="navbar-placeholder"></div>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 w-full flex items-center justify-center">
        
        <div class="text-center px-4">
            
            <div class="flex justify-center mb-2 relative">
                <svg class="w-48 h-48 sm:w-64 sm:h-64 animate-float drop-shadow-xl" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Bóng dưới cốc -->
                    <ellipse cx="100" cy="185" rx="45" ry="8" fill="#E5E7EB" />

                    <!-- Dấu hỏi chấm bay lơ lửng -->
                    <path d="M145 55 C145 45, 165 45, 165 55 C165 65, 155 65, 155 75" fill="none" stroke="#FBBF24" stroke-width="4" stroke-linecap="round" class="animate-pulse" />
                    <circle cx="155" cy="85" r="2.5" fill="#FBBF24" class="animate-pulse" />

                    <path d="M45 45 C45 35, 25 35, 25 45 C25 55, 35 55, 35 65" fill="none" stroke="#60A5FA" stroke-width="4" stroke-linecap="round" class="animate-pulse delay-150" />
                    <circle cx="35" cy="75" r="2.5" fill="#60A5FA" class="animate-pulse delay-150" />

                    <!-- Đuôi mèo thò ra -->
                    <path d="M 60 150 C 15 150 15 100 40 95" fill="none" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />

                    <!-- Tai mèo sau -->
                    <polygon points="65,65 50,25 90,45" fill="#FFFFFF" />
                    <polygon points="135,65 150,25 110,45" fill="#FFFFFF" />
                    <!-- Lòng tai -->
                    <polygon points="67,60 56,35 84,48" fill="#FCA5A5" />
                    <polygon points="133,60 144,35 116,48" fill="#FCA5A5" />

                    <!-- Đầu mèo -->
                    <circle cx="100" cy="80" r="45" fill="#FFFFFF" />
                    
                    <!-- Râu mèo -->
                    <path d="M 60 85 L 45 80 M 60 90 L 40 90 M 60 95 L 45 100" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
                    <path d="M 140 85 L 155 80 M 140 90 L 160 90 M 140 95 L 155 100" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>

                    <!-- Mắt mèo tròn to -->
                    <circle cx="82" cy="82" r="7" fill="#1E3A8A"/>
                    <circle cx="118" cy="82" r="7" fill="#1E3A8A"/>
                    <circle cx="84" cy="80" r="2.5" fill="#FFFFFF"/>
                    <circle cx="120" cy="80" r="2.5" fill="#FFFFFF"/>
                    
                    <!-- Má hồng -->
                    <ellipse cx="65" cy="92" rx="6" ry="3" fill="#FCA5A5" opacity="0.6"/>
                    <ellipse cx="135" cy="92" rx="6" ry="3" fill="#FCA5A5" opacity="0.6"/>
                    
                    <!-- Mũi và Miệng (hình chữ W) -->
                    <path d="M92 92 Q96 97 100 92 Q104 97 108 92" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round"/>
                    <ellipse cx="100" cy="89" rx="3" ry="2" fill="#FCA5A5" />

                    <!-- Quai cốc -->
                    <path d="M 140 120 C 180 110 180 170 140 160" fill="none" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
                    <!-- Thân cốc -->
                    <path d="M 55 100 L 55 165 C 55 180 145 180 145 165 L 145 100 Z" fill="#3B82F6" />
                    <!-- Highlight bóng bẩy của cốc -->
                    <path d="M 65 110 L 65 160 C 65 165 75 170 85 170 C 70 170 65 165 65 160 Z" fill="#FFFFFF" opacity="0.15"/>

                    <!-- Hai chân mèo bám miệng cốc -->
                    <rect x="70" y="92" width="18" height="24" rx="9" fill="#FFFFFF" />
                    <rect x="112" y="92" width="18" height="24" rx="9" fill="#FFFFFF" />
                    <!-- Ngón chân -->
                    <path d="M 76 108 L 76 114 M 82 108 L 82 114" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>
                    <path d="M 118 108 L 118 114 M 124 108 L 124 114" fill="none" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <h2 class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-blue-600 tracking-tighter mb-4 drop-shadow-sm">404</h2>
            
            <h3 class="text-2xl md:text-3xl font-bold text-gray-800 mb-3">Meo meo... Bạn đi lạc rồi kìa!</h3>
            <p class="text-gray-500 max-w-md mx-auto text-lg mb-8 leading-relaxed">
                Chú mèo con ngụy trang trong cốc nước đã giấu mất trang bạn đang tìm. Hãy cùng quay lại để tiếp tục lướt web nhé!
            </p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="/" class="inline-flex items-center justify-center px-8 py-3.5 border border-transparent text-base font-semibold rounded-full text-white bg-blue-600 hover:bg-blue-700 shadow-md hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    Về Trang Chủ
                </a>
                <button onclick="history.back()" class="inline-flex items-center justify-center px-8 py-3.5 border-2 border-blue-100 text-base font-semibold rounded-full text-blue-600 bg-white hover:bg-blue-50 hover:border-blue-200 shadow-sm transition-all duration-300 transform hover:-translate-y-1">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Quay Lại
                </button>
            </div>
        </div>

    </main>

    <footer class="bg-gray-800 text-white text-center py-6 mt-auto relative z-10">
        <p class="text-sm text-gray-400">&copy; <span id="year-footer"></span> Hugo.io.vn - Trạm Trò chơi & Tiện ích.</p>
    </footer>

    <script>
        document.getElementById('year-footer').innerText = new Date().getFullYear();

        // Tự động load menu từ file menu.html
        document.addEventListener('DOMContentLoaded', () => {
            fetch('/menu.html')
                .then(r => r.ok ? r.text() : '')
                .then(h => { if (h) document.getElementById('navbar-placeholder').innerHTML = h; })
                .catch(err => console.error('Lỗi khi tải menu:', err));
        });
    </script>
</body>
</html>
