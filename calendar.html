    <!-- Main Content -->
    <main class="flex-grow max-w-6xl mx-auto px-4 py-8 w-full flex flex-col md:flex-row gap-8">
        
        <!-- Cột Trái: Lịch Bloc Chi Tiết -->
        <div class="w-full md:w-1/3 flex-shrink-0">

                    <div class="absolute bottom-0 left-0 w-full flex justify-between px-2 opacity-30 pointer-events-none">
                        <span class="text-4xl leading-none">❀</span>
                        <span class="text-4xl leading-none">❀</span>
                    </div>
                </div>
                
                <!-- Body Bloc -->
                <div class="p-6 text-center">
                    <div class="text-xl font-medium text-gray-600 mb-2" id="bloc-weekday">Thứ --</div>
                    <div class="text-8xl md:text-9xl font-bold text-lunar-red leading-none mb-6 font-serif drop-shadow-sm" id="bloc-day">--</div>
                    
                    <hr class="border-t-2 border-dashed border-red-200 my-6 w-3/4 mx-auto">

        <!-- Cột Phải: Lịch Lưới Tháng -->

                <!-- Khung Chọn Ngày Tháng Năm Nhanh -->

                        <div class="text-xs text-blue-600 font-medium mt-1">Trở về hôm nay</div>
                    </div>
                    <button id="btn-next" class="p-2 hover:bg-red-50 text-lunar-red rounded-full transition-colors focus:outline-none">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <!-- Grid Days Header -->

                    <div class="text-gray-700 py-2">T2</div>
                    <div class="text-gray-700 py-2">T3</div>
                    <div class="text-gray-700 py-2">T4</div>
                    <div class="text-gray-700 py-2">T5</div>
                    <div class="text-gray-700 py-2">T6</div>
                    <div class="text-gray-700 py-2">T7</div>
                </div>

                <!-- Grid Calendar Cells -->

    <footer class="bg-gray-800 text-white text-center py-6 mt-auto">
        <p class="text-sm text-gray-400">&copy; <span id="year-footer"></span> Hugo.io.vn - Dữ liệu Lịch chuẩn Việt Nam.</p>
    </footer>

    <script>
        document.getElementById('year-footer').innerText = new Date().getFullYear();

        /** ==========================================
         * THUẬT TOÁN TÍNH ÂM LỊCH CHUẨN VIỆT NAM
         * ========================================== */
        const CAN = ['Giáp', 'Ất', 'Bính', 'Đinh', 'Mậu', 'Kỷ', 'Canh', 'Tân', 'Nhâm', 'Quý'];
        const CHI = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
        
        function INT(d) { return Math.floor(d); }

        function jdFromDate(dd, mm, yyyy) {
            let a = INT((14 - mm) / 12);
            let y = yyyy + 4800 - a;
            let m = mm + 12 * a - 3;
            let jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - INT(y / 100) + INT(y / 400) - 32045;
            if (jd < 2299161) jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - 32083;
            return jd;
        }

        function getSunLongitude(dayNumber, timeZone) {
            let t = (dayNumber - 2451545.0) / 36525.0;
            let t2 = t * t;
            let dr = Math.PI / 180.0;
            let l = 280.460 + 36000.770 * t;
            let g = 357.528 + 35999.050 * t;
            let lambda = l + (1.914602 - 0.004817 * t - 0.000014 * t2) * Math.sin(g * dr)
                           + (0.019993 - 0.000101 * t) * Math.sin(2.0 * g * dr)
                           + 0.000289 * Math.sin(3.0 * g * dr);
            while (lambda < 0.0)   lambda += 360.0;
            while (lambda >= 360.0) lambda -= 360.0;
            return lambda;
        }

        function getNewMoonDay(k, timeZone) {
            let t = k / 1236.85;
            let t2 = t * t;
            let t3 = t2 * t;
            let dr = Math.PI / 180.0;
            let jpe = 2415020.75933 + 29.53058868 * k + 0.0001178 * t2 - 0.000000155 * t3;
            jpe += 0.00033 * Math.sin((166.56 + 132.87 * t - 0.009173 * t2) * dr);
            let m     = 359.2242  +  29.10535608 * k - 0.0000333 * t2 - 0.00000347 * t3;
            let mprime= 306.0253  + 385.81691806 * k + 0.0107306 * t2 + 0.00001236 * t3;
            let f     =  21.2964  + 390.67050646 * k - 0.0016528 * t2 - 0.00000239 * t3;
            let c1 = (0.1734 - 0.000393 * t) * Math.sin(m * dr) + 0.0021 * Math.sin(2 * m * dr);
            let c2 = -0.4068 * Math.sin(mprime * dr) + 0.0161 * Math.sin(2 * mprime * dr);
            let c3 = -0.0004 * Math.sin(3 * mprime * dr);
            let c4 =  0.0104 * Math.sin(2 * f * dr) - 0.0051 * Math.sin((m + mprime) * dr);
            let c5 = -0.0074 * Math.sin((m - mprime) * dr) + 0.0004 * Math.sin((2 * f + m) * dr);
            let c6 = -0.0004 * Math.sin((2 * f - m) * dr) - 0.0006 * Math.sin((2 * f + mprime) * dr);
            let c7 =  0.0010 * Math.sin((2 * f - mprime) * dr) + 0.0005 * Math.sin((m + 2 * mprime) * dr);
            return INT(jpe + c1 + c2 + c3 + c4 + c5 + c6 + c7 + 0.5 + timeZone / 24.0);
        }

        function getLunarMonth11(yy, timeZone) {
            let off = jdFromDate(31, 12, yy) - 2415021.076998695;
            let k = INT(off / 29.530588853);
            let nm = getNewMoonDay(k, timeZone);
            let sunLong = getSunLongitude(nm - 0.5 - timeZone / 24.0, timeZone);
            if (sunLong >= 270.0) nm = getNewMoonDay(k - 1, timeZone);
            return nm;
        }

        function getLeapMonthOffset(a11, timeZone) {
            let k = INT((a11 - 2415021.076998695) / 29.530588853);
            let i = 1, last = 0;
            let arc = INT(getSunLongitude(getNewMoonDay(k + i, timeZone) - 0.5 - timeZone / 24.0, timeZone) / 30.0);
            do {
                last = arc;
                i++;
                arc = INT(getSunLongitude(getNewMoonDay(k + i, timeZone) - 0.5 - timeZone / 24.0, timeZone) / 30.0);
            } while (arc !== last && i < 14);
            return i - 1;
        }

        function convertSolar2Lunar(dd, mm, yyyy, timeZone) {
            let dayNumber  = jdFromDate(dd, mm, yyyy);
            let k          = INT((dayNumber - 2415021.076998695) / 29.530588853);
            let monthStart = getNewMoonDay(k + 1, timeZone);

            if (monthStart <= dayNumber) {
                k++;
            } else {
                monthStart = getNewMoonDay(k, timeZone);
            }

            let a11 = getLunarMonth11(yyyy, timeZone);
            let b11 = a11;
            if (a11 >= monthStart) {
                a11 = getLunarMonth11(yyyy - 1, timeZone);
            } else {
                b11 = getLunarMonth11(yyyy + 1, timeZone);
            }

            let day    = dayNumber - monthStart + 1;
            let diff   = INT((monthStart - a11) / 29);
            let month  = diff + 11;
            let isLeap = false;

            if (b11 - a11 > 365) {
                let leapMonthOffset = getLeapMonthOffset(a11, timeZone);
                let leapMonth = leapMonthOffset - 2;
                if (leapMonth < 0) leapMonth += 12;

                if (diff >= leapMonthOffset) {
                    if (leapMonth >= 10) {
                        month += 1;
                    } else {
                        month -= 1;
                    }
                }
                if (diff === leapMonthOffset) {
                    isLeap = true;
                }
            }

            if (month > 12) month -= 12;
            if (month < 1)  month += 12;

            let year = yyyy;
            if (month >= 11 && diff < 4) year -= 1;

            return { day, month, year, isLeap };
        }

        // Cache tránh tính lại nhiều lần trong cùng 1 lần render
        const _lunarCache = {};
        function getLunarDateFromSolar(dd, mm, yyyy) {
            const key = `${dd}-${mm}-${yyyy}`;
            if (_lunarCache[key]) return _lunarCache[key];

            let jd = jdFromDate(dd, mm, yyyy);
            let lunarInfo = convertSolar2Lunar(dd, mm, yyyy, 7.0);

            let lunarDay   = lunarInfo.day;
            let lunarMonth = lunarInfo.month;
            let lunarYear  = lunarInfo.year;
            let isLeap     = lunarInfo.isLeap;

            // Can Chi ngày (theo Julian Day)
            let canDay  = CAN[(jd + 9) % 10];
            let chiDay  = CHI[(jd + 1) % 12];

            // Can Chi năm âm lịch
            let canYear  = CAN[(lunarYear + 6) % 10];
            let chiYear  = CHI[(lunarYear + 8) % 12];

            // Can Chi tháng: phụ thuộc Can năm
            // Công thức chuẩn: tháng Dần (tháng 1 AL) của năm có Can index X
            // bắt đầu từ Can = (X * 2) % 10
            let yearCanIndex    = (lunarYear + 6) % 10;
            // Tháng Dần = tháng 1 AL → offset 0
            // Tháng hiện tại = lunarMonth, tháng Dần = 1 → diff = lunarMonth - 1
            let monthCanIndex   = (yearCanIndex * 2 + lunarMonth - 1) % 10;
            let canMonth = CAN[monthCanIndex];
            // Chi tháng: Dần cho tháng 1 → CHI index 2
            let chiMonth = CHI[(lunarMonth + 1) % 12];

            const result = {
                day: lunarDay, month: lunarMonth, year: lunarYear, isLeap,
                canDay, chiDay, canMonth, chiMonth, canYear, chiYear
            };
            _lunarCache[key] = result;
            return result;
        }

        /** ==========================================
         * QUẢN LÝ STATE VÀ RENDER GIAO DIỆN
         * ========================================== */
        const today = new Date();
        // currentDate: tháng/năm đang hiển thị trên grid (ngày luôn = 1)
        let currentDate  = new Date(today.getFullYear(), today.getMonth(), 1);
        // selectedDate: ngày đang được chọn để hiển thị trên Bloc
        let selectedDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        const weekdays = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];

        // Khởi tạo Select Option cho Tháng
        const monthSelect = document.getElementById('select-month');
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i - 1;   // 0-based để khớp với JS Date
            opt.text  = `Tháng ${i}`;
            monthSelect.appendChild(opt);
        }

        // ── Render Bloc bên trái ──────────────────────────────────────────────
        function renderBloc(date) {
            const d  = date.getDate();
            const m  = date.getMonth() + 1;   // 1-based
            const y  = date.getFullYear();
            const wd = date.getDay();

            const info = getLunarDateFromSolar(d, m, y);

            document.getElementById('bloc-day').innerText        = d;
            document.getElementById('bloc-month-year').innerText = `Tháng ${m} Năm ${y}`;
            document.getElementById('bloc-weekday').innerText    = weekdays[wd];

            document.getElementById('bloc-lunar-day').innerText   = info.day;
            document.getElementById('bloc-lunar-month').innerText = info.month + (info.isLeap ? ' (Nhuận)' : '');

            document.getElementById('cc-day').innerText  = `${info.canDay} ${info.chiDay}`;
            document.getElementById('cc-month').innerText = `${info.canMonth} ${info.chiMonth}`;
            document.getElementById('cc-year').innerText  = `${info.canYear} ${info.chiYear}`;

            // Đồng bộ date-picker
            const mStr = String(m).padStart(2, '0');
            const dStr = String(d).padStart(2, '0');
            document.getElementById('select-date').value = `${y}-${mStr}-${dStr}`;
        }

        // ── Render lưới tháng bên phải ───────────────────────────────────────
        function renderGrid(viewDate) {
            const year  = viewDate.getFullYear();
            const month = viewDate.getMonth();   // 0-based

            document.getElementById('grid-month-year').innerText = `Tháng ${month + 1}, ${year}`;
            document.getElementById('select-month').value = month;
            document.getElementById('select-year').value  = year;

            const firstDay      = new Date(year, month, 1).getDay();
            const daysInMonth   = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // ── Ngày tháng trước (in mờ) ──────────────────────────────────
            for (let i = 0; i < firstDay; i++) {
                let prevD = daysInPrevMonth - firstDay + i + 1;
                // tháng trước (1-based)
                let prevM = month === 0 ? 12 : month;           // month 0-based → tháng trước = month (vì month-1+1)
                let prevY = month === 0 ? year - 1 : year;
                let lunar = getLunarDateFromSolar(prevD, prevM, prevY);
                grid.innerHTML += createCell(prevD, lunar.day, lunar.month, false, false, false, prevY, prevM - 1, lunar.isLeap);
            }

            // ── Ngày tháng hiện tại ───────────────────────────────────────
            const todayObj = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                let isToday    = (i === todayObj.getDate() && month === todayObj.getMonth() && year === todayObj.getFullYear());
                let isSelected = (i === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
                let lunar = getLunarDateFromSolar(i, month + 1, year);
                // truyền month (0-based) cho createCell để onclick gọi selectDate đúng
                grid.innerHTML += createCell(i, lunar.day, lunar.month, true, isToday, isSelected, year, month, lunar.isLeap);
            }

            // ── Ngày tháng sau (in mờ) – lấp đầy đủ 42 ô ────────────────
            const totalCells    = firstDay + daysInMonth;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                // tháng sau (1-based)
                let nextM1 = month === 11 ? 1 : month + 2;
                let nextY  = month === 11 ? year + 1 : year;
                let lunar  = getLunarDateFromSolar(i, nextM1, nextY);
                grid.innerHTML += createCell(i, lunar.day, lunar.month, false, false, false, nextY, nextM1 - 1, lunar.isLeap);
            }
        }

        // ── Tạo 1 ô ngày ─────────────────────────────────────────────────────
        // Quy ước: y, m (0-based) dùng trong onclick → new Date(y, m, d)
        function createCell(solarDay, lunarDay, lunarMonth, isCurrentMonth, isToday, isSelected, y, m, isLeap) {
            let classes = "day-cell relative h-16 md:h-20 border rounded-lg flex flex-col items-center justify-center cursor-pointer transition-all duration-200 ";

            if (!isCurrentMonth) {
                classes += "bg-gray-50 text-gray-400 opacity-60 pointer-events-none ";
            } else {
                classes += "bg-white text-gray-800 hover:shadow-md ";
            }
            if (isSelected && isCurrentMonth) classes += "day-selected ";
            if (isToday    && isCurrentMonth) classes += "day-today ";

            // Hiển thị "1/5" hoặc "1/5N" khi là mùng 1 âm
            let lunarStr = lunarDay == 1
                ? `${lunarDay}/${lunarMonth}${isLeap ? 'N' : ''}`
                : lunarDay;

            let solarColor = (isCurrentMonth && isToday) ? '' : '';  // màu xử lý qua class day-today
            let lunarColor = (lunarDay == 1 || lunarDay == 15) ? 'text-lunar-red font-bold' : 'text-gray-500';

            return `
                <div class="${classes.trim()}"
                     ${isCurrentMonth ? `onclick="selectDate(${y}, ${m}, ${solarDay})"` : ''}>
                    <span class="solar-num text-xl md:text-2xl font-bold font-serif">${solarDay}</span>
                    <span class="text-xs ${lunarColor} font-serif mt-1">${lunarStr}</span>
                </div>`;
        }

        // ── Event: click chọn ngày ───────────────────────────────────────────
        // y, m là 0-based (từ createCell)
        window.selectDate = function(y, m, d) {
            selectedDate = new Date(y, m, d);
            renderBloc(selectedDate);
            renderGrid(currentDate);
        };

        // ── Event: Chọn tháng/năm nhanh ─────────────────────────────────────
        document.getElementById('select-month').addEventListener('change', function() {
            currentDate = new Date(currentDate.getFullYear(), parseInt(this.value), 1);
            renderGrid(currentDate);
        });

        document.getElementById('select-year').addEventListener('change', function() {
            const y = parseInt(this.value);
            if (y >= 1900 && y <= 2100) {
                currentDate = new Date(y, currentDate.getMonth(), 1);
                renderGrid(currentDate);
            }
        });

        // ── Event: Date-picker ───────────────────────────────────────────────
        document.getElementById('select-date').addEventListener('change', function() {
            if (!this.value) return;
            const [y, m, d] = this.value.split('-').map(Number);
            currentDate  = new Date(y, m - 1, 1);
            selectDate(y, m - 1, d);   // m-1 vì selectDate nhận 0-based month
        });

        // ── Event: Nút điều hướng ────────────────────────────────────────────
        document.getElementById('btn-prev').addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
            renderGrid(currentDate);
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
            renderGrid(currentDate);
        });

        document.getElementById('btn-today').addEventListener('click', () => {
            const t = new Date();
            currentDate = new Date(t.getFullYear(), t.getMonth(), 1);
            selectDate(t.getFullYear(), t.getMonth(), t.getDate());
        });

        // ── Khởi tạo ─────────────────────────────────────────────────────────
        renderBloc(selectedDate);
        renderGrid(currentDate);
    </script>
</body>
</html>
