    <!-- TÍCH HỢP THUẬT TOÁN ÂM LỊCH & XỬ LÝ GIAO DIỆN -->
    <script>
        document.getElementById('year-footer').innerText = new Date().getFullYear();

        /** ==========================================
         * THUẬT TOÁN TÍNH ÂM LỊCH CHUẨN VIỆT NAM (Rút gọn)
         * ========================================== */
        const CAN = ['Giáp', 'Ất', 'Bính', 'Đinh', 'Mậu', 'Kỷ', 'Canh', 'Tân', 'Nhâm', 'Quý'];
        const CHI = ['Tý', 'Sửu', 'Dần', 'Mão', 'Thìn', 'Tỵ', 'Ngọ', 'Mùi', 'Thân', 'Dậu', 'Tuất', 'Hợi'];
        
        function INT(d) { return Math.floor(d); }

        function jdFromDate(dd, mm, yyyy) {
            let a = INT((14 - mm) / 12);
            let y = yyyy + 4800 - a;
            let m = mm + 12 * a - 3;
            let jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - INT(y / 100) + INT(y / 400) - 32045;
            if (jd < 2299161) jd = dd + INT((153 * m + 2) / 5) + 365 * y + INT(y / 4) - 32083;
            return jd;
        }

        function getSunLongitude(dayNumber, timeZone) {
            let t = (dayNumber - 2451545.0) / 36525.0;
            let t2 = t * t;
            let dr = Math.PI / 180.0;
            let l = 280.460 + 36000.770 * t;
            let g = 357.528 + 35999.050 * t;
            let lambda = l + (1.914602 - 0.004817 * t - 0.000014 * t2) * Math.sin(g * dr) + (0.019993 - 0.000101 * t) * Math.sin(2.0 * g * dr) + 0.000289 * Math.sin(3.0 * g * dr);
            while (lambda < 0.0) lambda += 360.0;
            while (lambda >= 360.0) lambda -= 360.0;
            return lambda;
        }

        function getNewMoonDay(k, timeZone) {
            let t = k / 1236.85;
            let t2 = t * t;
            let t3 = t2 * t;
            let dr = Math.PI / 180.0;
            let jpe = 2415020.75933 + 29.53058868 * k + 0.0001178 * t2 - 0.000000155 * t3;
            jpe = jpe + 0.00033 * Math.sin((166.56 + 132.87 * t - 0.009173 * t2) * dr);
            let m = 359.2242 + 29.10535608 * k - 0.0000333 * t2 - 0.00000347 * t3;
            let mprime = 306.0253 + 385.81691806 * k + 0.0107306 * t2 + 0.00001236 * t3;
            let f = 21.2964 + 390.67050646 * k - 0.0016528 * t2 - 0.00000239 * t3;
            let c1 = (0.1734 - 0.000393 * t) * Math.sin(m * dr) + 0.0021 * Math.sin(2 * m * dr);
            let c2 = -0.4068 * Math.sin(mprime * dr) + 0.0161 * Math.sin(2 * mprime * dr);
            let c3 = -0.0004 * Math.sin(3 * mprime * dr);
            let c4 = 0.0104 * Math.sin(2 * f * dr) - 0.0051 * Math.sin((m + mprime) * dr);
            let c5 = -0.0074 * Math.sin((m - mprime) * dr) + 0.0004 * Math.sin((2 * f + m) * dr);
            let c6 = -0.0004 * Math.sin((2 * f - m) * dr) - 0.0006 * Math.sin((2 * f + mprime) * dr);
            let c7 = 0.0010 * Math.sin((2 * f - mprime) * dr) + 0.0005 * Math.sin((m + 2 * mprime) * dr);
            let jdnew = jpe + c1 + c2 + c3 + c4 + c5 + c6 + c7;
            return INT(jdnew + 0.5 + timeZone / 24.0);
        }

        function getLunarMonth11(yy, timeZone) {
            let off = jdFromDate(31, 12, yy) - 2415021.076998695;
            let k = INT(off / 29.530588853);
            let nm = getNewMoonDay(k, timeZone);
            let sunLong = getSunLongitude(nm - 0.5 - timeZone / 24.0, timeZone);
            if (sunLong >= 270.0) nm = getNewMoonDay(k - 1, timeZone);
            return nm;
        }

        function getLeapMonthOffset(a11, timeZone) {
            let k = INT((a11 - 2415021.076998695) / 29.530588853);
            let last = 0, i = 1, arc = 0;
            arc = INT(getSunLongitude(getNewMoonDay(k + i, timeZone) - 0.5 - timeZone / 24.0, timeZone) / 30.0);
            do {
                last = arc;
                i++;
                arc = INT(getSunLongitude(getNewMoonDay(k + i, timeZone) - 0.5 - timeZone / 24.0, timeZone) / 30.0);
            } while (arc != last && i < 14);
            return i - 1;
        }

        function convertSolar2Lunar(dd, mm, yyyy, timeZone) {
            let dayNumber = jdFromDate(dd, mm, yyyy);
            let k = INT((dayNumber - 2415021.076998695) / 29.530588853);
            let monthStart = getNewMoonDay(k + 1, timeZone);
            if (monthStart <= dayNumber) {
                k++;
            } else {
                monthStart = getNewMoonDay(k, timeZone);
            }
            let a11 = getLunarMonth11(yyyy, timeZone);
            let b11 = a11;
            if (a11 >= monthStart) {
                a11 = getLunarMonth11(yyyy - 1, timeZone);
            } else {
                b11 = getLunarMonth11(yyyy + 1, timeZone);
            }
            let day = dayNumber - monthStart + 1;
            let diff = INT((monthStart - a11) / 29);
            let month = diff + 11;
            let isLeap = false;
            if (b11 - a11 > 365) {
                let leapMonthOffset = getLeapMonthOffset(a11, timeZone);
                let leapMonth = leapMonthOffset - 2;
                if (leapMonth < 0) leapMonth += 12;
                if (leapMonth >= 10) leapMonth -= 1;
                if (diff >= leapMonthOffset) {
                    month = diff + 10;
                    if (diff == leapMonthOffset) isLeap = true;
                }
            }
            if (month > 12) month = month - 12;
            let year = yyyy;
            if (month >= 11 && diff < 4) year = yyyy - 1;
            return { day, month, year, isLeap };
        }

        function getLunarDateFromSolar(dd, mm, yyyy) {
            let jd = jdFromDate(dd, mm, yyyy);
            
            // Tính toán chuẩn theo Thiên văn học múi giờ +7 (Việt Nam)
            let lunarInfo = convertSolar2Lunar(dd, mm, yyyy, 7.0);
            let lunarDay = lunarInfo.day;
            let lunarMonth = lunarInfo.month;
            let lunarYear = lunarInfo.year;
            let isLeap = lunarInfo.isLeap;

            // Tính Can Chi chính xác
            let canDay = CAN[(jd + 9) % 10];
            let chiDay = CHI[(jd + 1) % 12];
            let canYear = CAN[(lunarYear + 6) % 10];
            let chiYear = CHI[(lunarYear + 8) % 12];
            
            // Tháng Can: Phụ thuộc vào Can của năm
            let yearIndex = (lunarYear + 6) % 10;
            let monthCanIndex = (yearIndex * 2 + lunarMonth + 1) % 10;
            let canMonth = CAN[monthCanIndex]; 
            let chiMonth = CHI[(lunarMonth + 1) % 12]; 

            return {
                day: lunarDay,
                month: lunarMonth,
                year: lunarYear,
                isLeap: isLeap,
                canDay: canDay, chiDay: chiDay,
                canMonth: canMonth, chiMonth: chiMonth,
                canYear: canYear, chiYear: chiYear
            };
        }

        /** ==========================================
         * QUẢN LÝ STATE VÀ RENDER GIAO DIỆN
         * ========================================== */
        let currentDate = new Date(); // Ngày đang hiển thị trên lưới lịch
        let selectedDate = new Date(); // Ngày đang được chọn để xem trên Bloc

        const weekdays = ["Chủ Nhật", "Thứ Hai", "Thứ Ba", "Thứ Tư", "Thứ Năm", "Thứ Sáu", "Thứ Bảy"];

        // Khởi tạo Select Option cho Tháng
        const monthSelect = document.getElementById('select-month');
        for (let i = 1; i <= 12; i++) {
            const option = document.createElement('option');
            option.value = i - 1;
            option.text = `Tháng ${i}`;
            monthSelect.appendChild(option);
        }

        // Hàm Render Lịch Bloc (Bên trái)
        function renderBloc(date) {
            const d = date.getDate();
            const m = date.getMonth() + 1;
            const y = date.getFullYear();
            const wd = date.getDay();

            // Tính lịch âm
            const lunarInfo = getLunarDateFromSolar(d, m, y);

            document.getElementById('bloc-day').innerText = d;
            document.getElementById('bloc-month-year').innerText = `Tháng ${m} Năm ${y}`;
            document.getElementById('bloc-weekday').innerText = weekdays[wd];
            
            document.getElementById('bloc-lunar-day').innerText = lunarInfo.day;
            document.getElementById('bloc-lunar-month').innerText = lunarInfo.month + (lunarInfo.isLeap ? " (Nhuận)" : "");
            
            document.getElementById('cc-day').innerText = `${lunarInfo.canDay} ${lunarInfo.chiDay}`;
            document.getElementById('cc-month').innerText = `${lunarInfo.canMonth} ${lunarInfo.chiMonth}`;
            document.getElementById('cc-year').innerText = `${lunarInfo.canYear} ${lunarInfo.chiYear}`;

            // Cập nhật giá trị cho ô Date Picker
            const yStr = y;
            const mStr = String(m).padStart(2, '0');
            const dStr = String(d).padStart(2, '0');
            document.getElementById('select-date').value = `${yStr}-${mStr}-${dStr}`;
        }

        // Hàm Render Lưới Lịch Tháng (Bên phải)
        function renderGrid(viewDate) {
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();
            
            document.getElementById('grid-month-year').innerText = `Tháng ${month + 1}, ${year}`;
            
            // Cập nhật Select box
            document.getElementById('select-month').value = month;
            document.getElementById('select-year').value = year;

            const firstDay = new Date(year, month, 1).getDay(); // Thứ của ngày mùng 1 dương (0-6)
            const daysInMonth = new Date(year, month + 1, 0).getDate(); // Số ngày trong tháng dương
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';

            // Ngày của tháng trước (in mờ)
            for (let i = 0; i < firstDay; i++) {
                let prevD = daysInPrevMonth - firstDay + i + 1;
                let prevM = month === 0 ? 12 : month;
                let prevY = month === 0 ? year - 1 : year;
                let lunar = getLunarDateFromSolar(prevD, prevM, prevY);
                grid.innerHTML += createCell(prevD, lunar.day, lunar.month, false, false, false, prevY, prevM, lunar.isLeap);
            }

            // Ngày của tháng hiện tại
            const today = new Date();
            for (let i = 1; i <= daysInMonth; i++) {
                let isToday = (i === today.getDate() && month === today.getMonth() && year === today.getFullYear());
                let isSelected = (i === selectedDate.getDate() && month === selectedDate.getMonth() && year === selectedDate.getFullYear());
                
                let currD = i;
                let currM = month + 1;
                let currY = year;
                let lunar = getLunarDateFromSolar(currD, currM, currY);
                
                grid.innerHTML += createCell(currD, lunar.day, lunar.month, true, isToday, isSelected, currY, month, lunar.isLeap);
            }

            // Ngày của tháng sau (in mờ) để lấp đầy grid (42 ô)
            const totalCells = firstDay + daysInMonth;
            const remainingCells = 42 - totalCells; // Giữ grid luôn 6 hàng x 7 cột cho đẹp
            if (remainingCells < 7) { // Chỉ render nếu cần thiết
                for (let i = 1; i <= remainingCells; i++) {
                    let nextM = month === 11 ? 1 : month + 2;
                    let nextY = month === 11 ? year + 1 : year;
                    let lunar = getLunarDateFromSolar(i, nextM, nextY);
                    grid.innerHTML += createCell(i, lunar.day, lunar.month, false, false, false, nextY, nextM, lunar.isLeap);
                }
            }
        }

        // Tạo 1 ô ngày (Cell)
        function createCell(solarDay, lunarDay, lunarMonth, isCurrentMonth, isToday, isSelected, y, m, isLeap) {
            let classes = "day-cell relative h-16 md:h-20 border rounded-lg flex flex-col items-center justify-center cursor-pointer transition-all duration-200 ";
            
            if (!isCurrentMonth) {
                classes += "bg-gray-50 text-gray-400 opacity-60 pointer-events-none ";
            } else {
                classes += "bg-white text-gray-800 hover:shadow-md ";
            }

            if (isSelected && isCurrentMonth) classes += "day-selected ";
            if (isToday && isCurrentMonth) classes += "day-today ";

            let lunarStr = lunarDay;
            // Hiển thị dạng "1/5" nếu là mùng 1 âm
            if (lunarDay == 1) lunarStr = `${lunarDay}/${lunarMonth}${isLeap ? 'N' : ''}`;

            return `
                <div class="${classes}" ${isCurrentMonth ? `onclick="selectDate(${y}, ${m}, ${solarDay})"` : ''}>
                    <span class="text-xl md:text-2xl font-bold font-serif ${isToday ? 'text-lunar-red' : ''}">${solarDay}</span>
                    <span class="text-xs ${lunarDay == 1 || lunarDay == 15 ? 'text-lunar-red font-bold' : 'text-gray-500'} font-serif mt-1">${lunarStr}</span>
                </div>
            `;
        }

        // Event: Click chọn ngày
        window.selectDate = function(y, m, d) {
            selectedDate = new Date(y, m, d);
            renderBloc(selectedDate);
            renderGrid(currentDate); // Re-render để update viền selected
        }

        // Event: Chuyển đổi Tháng/Năm nhanh
        document.getElementById('select-month').addEventListener('change', function() {
            currentDate.setMonth(parseInt(this.value));
            renderGrid(currentDate);
        });

        document.getElementById('select-year').addEventListener('change', function() {
            currentDate.setFullYear(parseInt(this.value));
            renderGrid(currentDate);
        });

        // Event: Chọn chính xác ngày tháng năm
        document.getElementById('select-date').addEventListener('change', function() {
            if (!this.value) return;
            const [y, m, d] = this.value.split('-');
            const year = parseInt(y);
            const month = parseInt(m) - 1; // JS month bắt đầu từ 0
            const day = parseInt(d);
            
            currentDate = new Date(year, month, 1); // Đưa grid về tháng đó
            selectDate(year, month, day); // Chuyển Bloc và grid focus về ngày đó
        });

        // Event: Nút điều hướng
        document.getElementById('btn-prev').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderGrid(currentDate);
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderGrid(currentDate);
        });

        document.getElementById('btn-today').addEventListener('click', () => {
            const today = new Date();
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1); // Reset view
            selectDate(today.getFullYear(), today.getMonth(), today.getDate());
        });

        // Khởi tạo lần đầu
        renderBloc(selectedDate);
        renderGrid(currentDate);

    </script>
</body>
</html>
