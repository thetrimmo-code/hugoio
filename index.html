<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo.io.vn - Tin Tức Tổng Hợp Hôm Nay</title>
    
    <!-- Tải Tailwind CSS để dựng giao diện -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Import Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6; /* Xám nhạt */
        }
        
        /* Hiệu ứng loading skeleton */
        .skeleton {
            background: #e2e8f0;
            background: linear-gradient(110deg, #ececec 8%, #f5f5f5 18%, #ececec 33%);
            border-radius: 5px;
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
        }
        
        @keyframes shine {
            to {
                background-position-x: -200%;
            }
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                    H
                </div>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight"> </h1>
            </div>
            <div class="text-sm font-medium text-gray-500" id="current-date">
                <!-- Ngày giờ hiện tại sẽ được chèn bằng JS -->
            </div>
        </div>
    </header>

    <!-- Banner -->
    <div class="bg-blue-600 text-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 md:py-16 text-center">
            <h2 class="text-3xl md:text-5xl font-extrabold mb-4">Điểm Tin Trong Ngày</h2>
            <p class="text-lg md:text-xl text-blue-100 max-w-2xl mx-auto">
                Tự động tổng hợp những thông tin nóng hổi và mới nhất từ các trang báo chính thống uy tín.
            </p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 w-full">
        
        <div class="flex items-center justify-between mb-8 border-b pb-4">
            <h3 class="text-2xl font-bold text-gray-800 border-l-4 border-blue-600 pl-3">Tin Tới Tấp</h3>
            <span class="text-sm bg-blue-100 text-blue-800 py-1 px-3 rounded-full font-medium">Tự động cập nhật</span>
        </div>

        <!-- Khung chứa danh sách tin tức -->
        <div id="news-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skeleton Loading (sẽ bị xóa khi tải xong) -->
            <div class="bg-white rounded-xl shadow-md overflow-hidden loading-card">
                <div class="h-48 skeleton"></div>
                <div class="p-5">
                    <div class="h-4 skeleton mb-2 w-1/4"></div>
                    <div class="h-6 skeleton mb-4 w-full"></div>
                    <div class="h-6 skeleton mb-4 w-5/6"></div>
                    <div class="h-4 skeleton w-full mb-2"></div>
                    <div class="h-4 skeleton w-2/3"></div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md overflow-hidden loading-card hidden md:block">
                <div class="h-48 skeleton"></div>
                <div class="p-5"><div class="h-4 skeleton mb-2 w-1/4"></div><div class="h-6 skeleton mb-4 w-full"></div><div class="h-6 skeleton mb-4 w-5/6"></div><div class="h-4 skeleton w-full mb-2"></div></div>
            </div>
            <div class="bg-white rounded-xl shadow-md overflow-hidden loading-card hidden lg:block">
                <div class="h-48 skeleton"></div>
                <div class="p-5"><div class="h-4 skeleton mb-2 w-1/4"></div><div class="h-6 skeleton mb-4 w-full"></div><div class="h-6 skeleton mb-4 w-5/6"></div><div class="h-4 skeleton w-full mb-2"></div></div>
            </div>
        </div>

        <div id="error-message" class="hidden text-center py-10">
            <p class="text-red-500 font-medium">Đã có lỗi xảy ra khi tải tin tức. Vui lòng thử lại sau.</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white text-center py-6 mt-auto">
        <p class="text-sm text-gray-400">
            &copy; <span id="year"></span> hugo.io.vn - Dữ liệu được tổng hợp tự động từ RSS các báo.
        </p>
    </footer>

    <script>
        // --- 1. Cập nhật Ngày giờ ---
        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('vi-VN', options);
            document.getElementById('year').innerText = now.getFullYear();
        }
        updateDate();

        // --- 2. Cấu hình nguồn báo (RSS Feeds) ---
        // Sử dụng api.rss2json.com để chuyển đổi RSS thành JSON và vượt qua lỗi CORS
        const rssSources = [
            { name: "VnExpress", url: "https://vnexpress.net/rss/tin-moi-nhat.rss" },
            { name: "Tuổi Trẻ", url: "https://tuoitre.vn/rss/tin-moi-nhat.rss" },
            { name: "Thanh Niên", url: "https://thanhnien.vn/rss/home.rss" }
        ];

        const apiKey = ""; // Rss2json bản miễn phí không cần API key nếu request ít
        const apiBaseUrl = "https://api.rss2json.com/v1/api.json?rss_url=";

        // --- 3. Logic lấy tin tức ---
        async function fetchNews() {
            const container = document.getElementById('news-container');
            const errorMsg = document.getElementById('error-message');
            let allArticles = [];

            try {
                // Tải dữ liệu từ tất cả các nguồn cùng lúc (Promise.all)
                const fetchPromises = rssSources.map(source => 
                    fetch(`${apiBaseUrl}${encodeURIComponent(source.url)}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.status === 'ok') {
                                // Thêm tên báo vào từng bài viết
                                return data.items.map(item => ({ ...item, sourceName: source.name }));
                            }
                            return [];
                        })
                        .catch(err => {
                            console.error(`Lỗi lấy dữ liệu từ ${source.name}:`, err);
                            return []; // Trả về mảng rỗng nếu lỗi 1 nguồn để không chết toàn trang
                        })
                );

                const results = await Promise.all(fetchPromises);
                
                // Gộp tất cả các mảng bài viết lại
                allArticles = results.flat();

                // Sắp xếp bài viết theo thời gian (mới nhất lên đầu)
                allArticles.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

                // Lấy khoảng 30 tin mới nhất để hiển thị
                const topArticles = allArticles.slice(0, 30);

                // --- 4. Hiển thị ra giao diện ---
                // Xóa skeleton loaders
                container.innerHTML = '';

                if(topArticles.length === 0) {
                    throw new Error("Không có bài viết nào");
                }

                topArticles.forEach(article => {
                    // Trích xuất ảnh (nhiều báo Việt Nam giấu ảnh trong thẻ description)
                    let imageUrl = article.thumbnail;
                    if (!imageUrl || imageUrl === "") {
                        const imgMatch = article.description.match(/src\s*=\s*"(.+?)"/);
                        if (imgMatch && imgMatch[1]) {
                            imageUrl = imgMatch[1];
                        } else {
                            // Ảnh mặc định nếu không tìm thấy
                            imageUrl = 'https://images.unsplash.com/photo-1585829365295-ab7cd400c167?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80'; 
                        }
                    }

                    // Trích xuất mô tả ngắn gọn (loại bỏ thẻ HTML rác từ RSS)
                    let cleanDesc = article.description.replace(/<[^>]+>/g, '').trim();
                    if(cleanDesc.length > 150) cleanDesc = cleanDesc.substring(0, 150) + '...';

                    // Tính toán thời gian tương đối (VD: 2 giờ trước)
                    const pubDate = new Date(article.pubDate);
                    const now = new Date();
                    const diffMs = now - pubDate;
                    const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
                    const diffMins = Math.floor(diffMs / (1000 * 60));
                    
                    let timeString = pubDate.toLocaleDateString('vi-VN');
                    if (diffHrs < 24 && diffHrs > 0) {
                        timeString = `${diffHrs} giờ trước`;
                    } else if (diffMins < 60) {
                        timeString = `${diffMins} phút trước`;
                    }

                    // Tạo thẻ bài viết
                    const articleCard = `
                        <article class="bg-white rounded-xl shadow-sm hover:shadow-lg transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col group h-full">
                            <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="block overflow-hidden relative h-48">
                                <img src="${imageUrl}" alt="${article.title}" class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-500" onerror="this.src='https://images.unsplash.com/photo-1585829365295-ab7cd400c167?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80'">
                                <div class="absolute top-3 left-3 bg-blue-600 text-white text-xs font-bold px-2 py-1 rounded shadow">
                                    ${article.sourceName}
                                </div>
                            </a>
                            <div class="p-5 flex flex-col flex-grow">
                                <div class="text-xs text-gray-500 mb-2 flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    ${timeString}
                                </div>
                                <a href="${article.link}" target="_blank" rel="noopener noreferrer">
                                    <h4 class="text-xl font-bold text-gray-900 mb-2 line-clamp-2 hover:text-blue-600 transition-colors">
                                        ${article.title}
                                    </h4>
                                </a>
                                <p class="text-gray-600 text-sm line-clamp-3 mb-4 flex-grow">
                                    ${cleanDesc}
                                </p>
                                <a href="${article.link}" target="_blank" rel="noopener noreferrer" class="text-blue-600 font-semibold text-sm inline-flex items-center hover:text-blue-800 mt-auto">
                                    Đọc tiếp 
                                    <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                                </a>
                            </div>
                        </article>
                    `;
                    container.innerHTML += articleCard;
                });

            } catch (error) {
                console.error("Lỗi tổng thể:", error);
                container.innerHTML = '';
                errorMsg.classList.remove('hidden');
            }
        }

        // Bắt đầu tải tin tức
        fetchNews();

    </script>
</body>
</html>
